### model
model_name_or_path: Qwen/Qwen2-VL-2B-Instruct
customize_model_class: ishift # must be set as this for our model, must be set None for original qwen
num_inner_forward_run: 2
para_mask_id: 0
para_mask_ratio: 0.0
vision_encoder_ls: clip
flash_attn: fa2
### method
stage: sft
do_predict: true
finetuning_type: freefreeze
freefreeze_frozen_modules: "all"

### dataset
eval_dataset: ishift_evaluation
template: ishift_qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 64

### output
output_dir: outputs/inference
overwrite_output_dir: true

### eval
per_device_eval_batch_size: 25
predict_with_generate: true
ddp_timeout: 180000000
bf16: true